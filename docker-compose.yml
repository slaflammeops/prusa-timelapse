services:
  prusa-timelapse:
    image: python:3.12-slim
    container_name: prusa-timelapse
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "
        pip install -q --no-cache-dir fastapi uvicorn[standard] python-multipart &&
        apt-get update -q &&
        apt-get install -y -q --no-install-recommends ffmpeg &&
        rm -rf /var/lib/apt/lists/* &&
        chmod 777 /frames /videos &&
        uvicorn main:app --host 0.0.0.0 --port 8080
      "
    ports:
      - "8080:8080"
    volumes:
      - /path/to/your/app:/app
      - /path/to/your/frames:/frames
      - /path/to/your/videos:/videos
    environment:
      - TZ=America/New_York
      - DEBIAN_FRONTEND=noninteractive
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    tty: true
